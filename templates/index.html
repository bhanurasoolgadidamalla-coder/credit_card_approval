<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="icon"></div>

    <h1>Credit Card Approval</h1>

    <p class="subtitle">
        Enter your financial details to predict approval status.
    </p>

    <form action="/predict" method="POST">

        <div class="input-group">
            <input type="number" name="age" placeholder="Age" required>
        </div>

        <div class="input-group">
            <input type="number" name="income" placeholder="Annual Income" required>
        </div>

        <div class="input-group">
            <input type="number" name="score" placeholder="Credit Score" required>
        </div>

        <div class="input-group">
            <input type="number" name="loan" placeholder="Loan Amount" required>
        </div>

        <div class="input-group">
            <input type="number" name="experience" placeholder="Employment Years" required>
        </div>

        <button type="submit">
            Predict Approval
        </button>

    </form>

</div>

</body>
</html>
